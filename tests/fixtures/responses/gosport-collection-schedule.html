<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Collection Schedule - Gosport Borough Council</title>
</head>
<body>
    <h1>Your Waste Collection Schedule</h1>
    <div class="address">
        <strong>Property:</strong> 1 High Street, Gosport, PO12 1BU
    </div>
    
    <div class="schedule">
        <ul class="collection-list">
            <li class="collection">
                <span class="service-name">General Waste</span>
                <span class="next-date">Friday 3 April 2026</span>
            </li>
            <li class="collection">
                <span class="service-name">Recycling</span>
                <span class="next-date">Friday 10 April 2026</span>
            </li>
            <li class="collection">
                <span class="service-name">Food Waste</span>
                <span class="next-date">Friday 3 April 2026</span>
            </li>
        </ul>
    </div>
    
    <div class="info">
        <p>Collections are weekly for food waste and fortnightly for general waste and recycling.</p>
    </div>
</body>
</html>
