global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'hampshire-bin-platform'
    environment: 'local'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alerting rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # API service metrics
  - job_name: 'api'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - api:3000
    metric_relabel_configs:
      # Drop sensitive labels if any
      - source_labels: [__name__]
        regex: '.*password.*|.*secret.*|.*token.*'
        action: drop

  # Synthetic monitoring worker metrics
  - job_name: 'monitor'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - monitor:3000
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - localhost:9090

  # Redis exporter (optional - add if redis-exporter deployed)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets:
  #         - redis-exporter:9121

  # PostgreSQL exporter (optional - add if postgres-exporter deployed)
  # - job_name: 'postgres'
