version: '3.9'

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://binday:binday_dev_password@postgres:5432/binday
      DATABASE_SSL: "false"
      REDIS_URL: redis://:redis_dev_password@redis:6379
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      AZURE_STORAGE_CONTAINER_NAME: evidence
      LOG_LEVEL: debug
      LOG_PRETTY: "true"
      API_KEY_SALT: $2b$10$ExampleSaltForDevelopmentOnly
      ADMIN_API_KEY_HASH: $2b$12$ExampleHashForDevelopmentOnly
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      azurite:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: binday
      POSTGRES_USER: binday
      POSTGRES_PASSWORD: binday_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_GB.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../src/storage/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binday -d binday"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass redis_dev_password
      --save ""
      --appendonly no
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --loose
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    networks:
      - app-network

  # Playwright worker - isolated network for browser automation
  # Mount specific council adapters as needed
  playwright:
    image: mcr.microsoft.com/playwright:v1.42.0-jammy
    working_dir: /app
    volumes:
      - ..:/app:ro
    environment:
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_TIMEOUT: 30000
    # No network by default - mount with specific network when needed
    # network_mode: none
    networks:
      - adapter-network

networks:
  app-network:
    driver: bridge
  adapter-network:
    driver: bridge
    internal: false  # Allow external access for council sites

volumes:
  postgres_data:
  azurite_data:
